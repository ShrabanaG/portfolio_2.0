<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Shrabana Goswami — Frontend Engineer specialising in React, Next.js and TypeScript. Responsive, accessible, high-performance web apps."
    />

    <!--
      Open Graph / Twitter cards — controls the preview shown on LinkedIn,
      X, Slack, etc. when this site is shared or added to "Featured".
      AFTER DEPLOYING: replace every "https://your-domain.com" below with your
      real live URL. og:image / twitter:image MUST be absolute URLs (a relative
      path won't render on LinkedIn).
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shrabana Goswami — Frontend Engineer" />
    <meta
      property="og:description"
      content="Interactive portfolio — React, Next.js & TypeScript. Responsive, accessible, Lighthouse 98 / 100 / 100 / 100."
    />
    <meta property="og:url" content="https://your-domain.com/" />
    <meta property="og:image" content="https://your-domain.com/og-image.png" />
    <meta property="og:image:width" content="1440" />
    <meta property="og:image:height" content="900" />
    <meta property="og:image:alt" content="Shrabana Goswami portfolio hero section" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shrabana Goswami — Frontend Engineer" />
    <meta
      name="twitter:description"
      content="Interactive portfolio — React, Next.js & TypeScript. Responsive, accessible, Lighthouse 98 / 100 / 100 / 100."
    />
    <meta name="twitter:image" content="https://your-domain.com/og-image.png" />

    <title>Shrabana Goswami — Frontend Engineer</title>
  </head>

    <div id="root"></div>
